<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IYKVIN FLEX TECHNICAL VENTURES</title>

<style>

:root{
--gold:#d4af37;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:black;
color:white;
}

/* HEADER IMAGE */

.header img{
width:100%;
display:block;
}

/* TITLE */

.title{
text-align:center;
padding:15px;
border-bottom:3px solid var(--gold);
}

.title h1{
color:var(--gold);
margin:0;
}

/* INFO */

.info{
text-align:center;
padding:20px;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
max-width:1100px;
margin:auto;
}

.gallery img{
width:100%;
border:2px solid var(--gold);
border-radius:6px;
}

/* FORM */

.form-box{
max-width:900px;
margin:40px auto;
padding:25px;
background:#050505;
border:1px solid var(--gold);
}

.form-box h2{
text-align:center;
color:var(--gold);
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

input,select,textarea{
width:100%;
padding:12px;
background:#020617;
border:1px solid #333;
color:white;
}

textarea{
grid-column:span 2;
height:70px;
}

/* PRODUCTS CHECKLIST */

.product-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px 20px;
margin-top:10px;
}

button{
width:100%;
margin-top:20px;
padding:14px;
background:var(--gold);
border:none;
font-weight:bold;
cursor:pointer;
}

/* MAP */

.map{
margin:40px auto;
max-width:900px;
border:2px solid var(--gold);
}

.map iframe{
width:100%;
height:300px;
border:0;
}

footer{
text-align:center;
padding:20px;
color:#aaa;
}

</style>
</head>

<body>

<!-- TOP HEAD IMAGE -->

<div class="header">

</p>

<p>
<b>Address:</b><br>
175 New Abeokuta Expressway Behind BRT Bus Stop Iyana Ipaja Lagos
</p>

</div>

<img src="https://raw.githubusercontent.com/allroundadvert/IYKVIN-FLEX-TECHNICAL-VENTURES-/4d78f3e350b1172e9a9ab0eeeb15b01bc57b1580/IMG-20260312-WA0133.jpg">

<button type="submit">Submit Request</button>

</div>

<div class="map">

</html>
