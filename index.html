<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IYKVIN FLEX TECHNICAL VENTURES</title>

<style>

:root{
--gold:#d4af37;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#000;
color:white;
}

/* HEADER IMAGE */

.header img{
width:100%;
display:block;
}

/* TITLE */

.title{
text-align:center;
padding:15px;
border-bottom:3px solid var(--gold);
}

.title h1{
color:var(--gold);
margin:0;
}

/* INFO */

.info{
text-align:center;
padding:20px;
}

/* FORM */

.form-box{
max-width:900px;
margin:30px auto;
padding:25px;
background:#050505;
border:1px solid var(--gold);
}

.form-box h2{
text-align:center;
color:var(--gold);
margin-bottom:20px;
}

.form-field{
margin-bottom:15px;
}

input,select,textarea{
width:100%;
padding:12px;
background:#020617;
border:1px solid #333;
color:white;
}

textarea{
height:70px;
}

/* PRODUCTS */

.products{
margin-top:25px;
}

.products h3{
color:var(--gold);
}

.product-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:5px 20px;
}

.product-grid label{
display:block;
}

/* BUTTON */

button{
width:100%;
margin-top:20px;
padding:15px;
background:var(--gold);
border:none;
font-weight:bold;
cursor:pointer;
}

/* MAP */

.map{
margin:40px auto;
max-width:900px;
border:2px solid var(--gold);
}

.map iframe{
width:100%;
height:300px;
border:0;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
right:15px;
bottom:25px;
background:#25d366;
color:white;
padding:14px 18px;
border-radius:40px;
text-decoration:none;
font-weight:bold;
}

footer{
text-align:center;
padding:15px;
color:#aaa;
}

</style>
</head>

<body>

<div class="header">
<img src="https://raw.githubusercontent.com/allroundadvert/IYKVIN-FLEX-TECHNICAL-VENTURES-/d5a239537d11521000a940819e4474a3348fc6e3/1773346107290.png">
</div>

<div class="title">
<h1>IYKVIN FLEX TECHNICAL VENTURES</h1>
</div>

<div class="info">

<p>
Dealers on high quality tools and hardware,
industrial welding machines, drilling and grinding machines.
</p>

<p>
<b>Address:</b><br>
175 New Abeokuta Expressway<br>
Behind BRT Bus Stop Iyana Ipaja<br>
Lagos
</p>

</div>

<div class="form-box">

<h2>Customer Request Form</h2>

<form onsubmit="sendWhatsApp();return false;">

<div class="form-field">
<input id="name" placeholder="Name">
</div>

<div class="form-field">
<input id="phone" placeholder="Phone Number">
</div>

<div class="form-field">
<input id="location" placeholder="Customer Location">
</div>

<div class="form-field">
<select id="service">
<option>Buying</option>
<option>Repair</option>
</select>
</div>

<div class="form-field">
<textarea id="specs" placeholder="Specifications"></textarea>
</div>

<div class="products">

<h3>PLACE YOUR ORDERS</h3>

<div class="product-grid">

<label><input type="checkbox" value="Mild Steel"> Mild Steel</label>
<label><input type="checkbox" value="Low Hydrogen"> Low Hydrogen</label>

<label><input type="checkbox" value="Stainless Steel"> Stainless Steel</label>
<label><input type="checkbox" value="Cast Iron"> Cast Iron</label>

<label><input type="checkbox" value="Aluminium"> Aluminium</label>
<label><input type="checkbox" value="Special Electrodes"> Special Electrodes</label>

<label><input type="checkbox" value="Grinding Discs"> Grinding Discs</label>
<label><input type="checkbox" value="Cutting Discs"> Cutting Discs</label>

<label><input type="checkbox" value="Safety Items"> Safety Items</label>
<label><input type="checkbox" value="Angle Grinder"> Angle Grinder</label>

<label><input type="checkbox" value="Drills"> Drills</label>
<label><input type="checkbox" value="Power Tools Spares"> Power Tools Spares</label>

<label><input type="checkbox" value="Magnetic Drill Stand"> Magnetic Drill Stand</label>
<label><input type="checkbox" value="Welding Transformers"> Welding Transformers</label>

<label><input type="checkbox" value="Welding Rectifiers"> Welding Rectifiers</label>
<label><input type="checkbox" value="Welding Generating Sets"> Welding Generating Sets</label>

<label><input type="checkbox" value="Compressors"> Compressors</label>
<label><input type="checkbox" value="Construction Mining Tools"> Construction Tools</label>

<label><input type="checkbox" value="Outboard Engines"> Outboard Engines</label>
<label><input type="checkbox" value="Oxy Regulators"> Oxy Regulators</label>

<label><input type="checkbox" value="Cutting Torches"> Cutting Torches</label>
<label><input type="checkbox" value="Nozzle"> Nozzle</label>

<label><input type="checkbox" value="Electrode Holders"> Electrode Holders</label>
<label><input type="checkbox" value="Flashback Arrestors"> Flashback Arrestors</label>

<label><input type="checkbox" value="Welding Cables"> Welding Cables</label>
<label><input type="checkbox" value="Welding Hoses"> Welding Hoses</label>

</div>
</div>

<button type="submit">Submit Request</button>

</form>

</div>

<div class="map">
<iframe src="https://maps.google.com/maps?q=iyana%20ipaja%20lagos&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</div>

<footer>
© IYKVIN FLEX TECHNICAL VENTURES
</footer>

<a class="whatsapp" href="https://wa.me/2348100573526">WhatsApp</a>

<script>

function sendWhatsApp(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let location=document.getElementById("location").value;
let service=document.getElementById("service").value;
let specs=document.getElementById("specs").value;

let products=[];
document.querySelectorAll('input[type=checkbox]:checked').forEach((item)=>{
products.push(item.value);
});

let msg="Customer Request:%0A";
msg+="Name: "+name+"%0A";
msg+="Phone: "+phone+"%0A";
msg+="Location: "+location+"%0A";
msg+="Service: "+service+"%0A";
msg+="Products: "+products.join(", ")+"%0A";
msg+="Specifications: "+specs;

window.open("https://wa.me/2348100573526?text="+msg);

}

</script>

</body>
</html>
