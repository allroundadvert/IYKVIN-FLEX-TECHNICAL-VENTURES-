color:white;
}

textarea{
height:70px;
}

/* PRODUCTS */

.product-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px 20px;
margin-top:10px;
}

/* BUTTON */

button{
width:100%;
margin-top:20px;
padding:15px;
background:var(--gold);
border:none;
font-weight:bold;
cursor:pointer;
}

/* MAP */

margin:40px auto;

width:100%;
height:300px;
